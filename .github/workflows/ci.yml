name: Enterprise RAG CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SUPABASE_URL: dummy
      SUPABASE_KEY: dummy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest

      - name: Validate imports
        run: |
          python -c "from api.main import app; print('FastAPI import OK')"
          python -c "from src.config_loader import config; print('Config load OK')"
          python -c "from src.query_router import is_tabular_analytics_query; print('Router import OK')"
          python -c "from src.tabular_query_engine import answer_tabular_query; print('Pandas engine import OK')"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v