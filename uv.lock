    "python_full_version < '3.13' and sys_platform == 'win32'",
    "python_full_version == '3.13.*' and sys_platform == 'emscripten'",
    "python_full_version < '3.13' and sys_platform == 'emscripten'",
    "python_full_version == '3.13.*' and sys_platform != 'emscripten' and sys_platform != 'win32'",
    "python_full_version < '3.13' and sys_platform != 'emscripten' and sys_platform != 'win32'",
]

