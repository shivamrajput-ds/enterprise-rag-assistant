project:
  name: "Enterprise RAG Assistant"

paths:
  data_dir: "data/"
  documents_dir: "data/documents"
  logs_dir: "logs/"
  vectorstore_dir: "data/vectorstore"

chunking:
  chunk_size: 1000
  chunk_overlap: 200

embedding:
  model_name: "BAAI/bge-base-en-v1.5"

llm:
  provider: "groq"
  model_name: "llama-3.1-8b-instant"
  temperature: 0.0
  max_tokens: 1024

retriever:
  top_k: 8
  per_query_k: 4

reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

hybrid_search:
  enabled: true
  bm25_top_k: 6

debug:
  retrieval: false
  reranker: false